<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/normalize.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <title>Registro - Peque Mundo</title>
</head>
<body>

  <main class="login-section">

    <div class="brand">
      <img src="{{ url_for('static', filename='img/Logo_pequemundo.png') }}" alt="Peque Mundo" class="logo">
    </div>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for cat, msg in messages %}
          <div style="width:100%;max-width:43rem;margin-bottom:1rem;padding:1.2rem 1.6rem;border-radius:1rem;
            background:{% if cat=='danger' %}#fee2e2{% elif cat=='success' %}#dcfce7{% else %}#dbeafe{% endif %};
            color:{% if cat=='danger' %}#991b1b{% elif cat=='success' %}#166534{% else %}#1e40af{% endif %};
            font-size:1.4rem;">
            {{ msg }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="login-card">
      <h1>Crear cuenta</h1>
      <p>Regístrate para continuar</p>

      <form class="login-form" action="{{ url_for('auth.registro') }}" method="POST">
        <div class="form-group">
          <label for="nombre">Nombre completo</label>
          <input type="text" id="nombre" name="nombre" placeholder="Ingresa tu nombre" required>
        </div>
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" name="email" placeholder="ejemplo@ejemplo.com" required>
        </div>
        <div class="form-group">
          <label for="telefono">Teléfono</label>
          <input type="tel" id="telefono" name="telefono" placeholder="+56 9 1234 5678">
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required>
        </div>
        <div class="form-group">
          <label for="confirmar_password">Confirmar contraseña</label>
          <input type="password" id="confirmar_password" name="confirmar_password" placeholder="Repite tu contraseña" required>
        </div>
        <button type="submit" class="primary-button">Crear cuenta</button>
      </form>

      <p class="register-text">
        ¿Ya tienes cuenta? <a href="{{ url_for('auth.login') }}">Inicia sesión</a>
      </p>
    </div>

    <div style="margin-top:1.6rem;">
      <a href="{{ url_for('publico.inicio') }}" style="color:#6b7280;font-size:1.4rem;text-decoration:none;">← Volver al inicio</a>
    </div>

  </main>

</body>
</html>
