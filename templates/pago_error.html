<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/normalize.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <title>Error de pago - Peque Mundo</title>
</head>
<body>
  <header class="home-header">
    <a href="{{ url_for('publico.inicio') }}" class="home-brand">
      <img src="{{ url_for('static', filename='img/Logo_pequemundo.png') }}" alt="Peque Mundo" class="home-logo">
    </a>
  </header>
  <main class="catalog-main">
    <div class="orders-empty" style="padding:3rem 1rem;">
      <span class="orders-empty-icon">⚠️</span>
      <h1>Error al conectar con el sistema de pago</h1>
      <p>No se pudo establecer conexión con Mercado Pago. Intenta más tarde.</p>
      {% if error %}<p style="font-size:.8rem;color:#aaa;">Detalle: {{ error }}</p>{% endif %}
      <a href="{{ url_for('carrito.carrito') }}" class="primary-button" style="margin-top:1.5rem;display:inline-block;">Volver al carrito</a>
    </div>
  </main>
</body>
</html>
