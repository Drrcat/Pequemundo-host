{% extends "admin_base.html" %}
{% block titulo %}Editar Producto{% endblock %}
{% block topbar_titulo %}Editar Producto{% endblock %}

{% block contenido %}

<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card border-0 shadow-sm">
      <div class="card-header bg-primary text-white">
        <h5 class="mb-0">Editar: {{ producto.nombre }}</h5>
      </div>
      <div class="card-body">
        <form method="POST">

          <div class="mb-3">
            <label class="form-label fw-medium">Nombre del producto</label>
            <input type="text" name="nombre" class="form-control" value="{{ producto.nombre }}" required>
          </div>

          <div class="mb-3">
            <label class="form-label fw-medium">Descripción</label>
            <textarea name="descripcion" class="form-control" rows="3" required>{{ producto.descripcion }}</textarea>
          </div>

          <div class="mb-3">
            <label class="form-label fw-medium">Nombre de imagen</label>
            <input type="text" name="imagen" class="form-control" value="{{ producto.imagen }}" required>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-medium">Categoría</label>
              <select name="categoria" class="form-select">
                {% for cat in ['Cunas','Camas','Cómodas','Escritorios','Sillas','Clósets'] %}
                  <option {% if producto.categoria == cat %}selected{% endif %}>{{ cat }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-medium">Estado</label>
              <select name="estado" class="form-select">
                {% for est in ['Activo','Agotado','Oculto'] %}
                  <option {% if producto.estado == est %}selected{% endif %}>{{ est }}</option>
                {% endfor %}
              </select>
            </div>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-medium">Precio ($)</label>
              <input type="number" step="1" name="precio" class="form-control" value="{{ producto.precio|int }}" required>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-medium">Stock</label>
              <input type="number" name="stock" class="form-control" value="{{ producto.stock }}" required>
            </div>
          </div>

          <div class="d-flex gap-2 mt-2">
            <button type="submit" class="btn btn-primary">Actualizar Producto</button>
            <a href="{{ url_for('admin.productos') }}" class="btn btn-outline-secondary">Cancelar</a>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
